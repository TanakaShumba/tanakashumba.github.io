<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tanaka Shumba | Cybersecurity Portfolio</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: black; color: #39ff14; overflow-x: hidden; }
    header { text-align: center; padding: 60px 20px 30px; position: relative; z-index: 1; }
    header img { width: 140px; height: 140px; border-radius: 50%; border: 3px solid #39ff14; margin-bottom: 20px; object-fit: cover; }
    header h1 { font-size: 3rem; margin: 10px 0; }
    header p { font-size: 1.2rem; max-width: 650px; margin: 0 auto; line-height: 1.5; color: white; }
    nav { position: sticky; top: 0; background: rgba(0,0,0,0.85); padding: 15px 0; text-align: center; z-index: 100; border-bottom: 2px solid #39ff14; }
    nav a { margin: 0 15px; color: #39ff14; text-decoration: none; font-weight: bold; transition: 0.3s; }
    nav a:hover { color: white; }
    .btn { display: inline-block; margin-top: 15px; padding: 10px 20px; border: 2px solid #39ff14; color: #39ff14; text-decoration: none; border-radius: 30px; transition: 0.3s; font-size: 0.9rem; }
    .btn:hover { background: #39ff14; color: black; }
    .btn-primary { background: #39ff14; color: black; font-weight: bold; margin-right: 10px; }
    section { padding: 60px 20px; position: relative; z-index: 1; }
    h2 { text-align: center; margin-bottom: 40px; font-size: 2.2rem; color: #39ff14; }
    .projects { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
    .card { background: rgba(0, 0, 0, 0.7); border: 2px solid #39ff14; border-radius: 15px; padding: 20px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; transition: 0.3s; }
    .card h3 { color: #39ff14; margin-bottom: 10px; }
    .card p { color: white; font-size: 0.95rem; line-height: 1.4; margin-bottom: 15px; }
    .tech { color: #ddd; font-size: 0.85rem; font-style: italic; margin-bottom: 15px; }
    #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
  </style>
</head>
<body>
  <div id="particles-js"></div>
  <nav><a href="#about">About</a><a href="#projects">Projects</a></nav>
  <header>
    <img src="images/about-me.jpg?v=3" alt="Tanaka Shumba" />
    <h1>Tanaka Shumba</h1>
    <p>Computer Science student at Troy University. Passionate about cybersecurity and network protection.</p>
  </header>
  <section id="projects">
    <h2>Projects</h2>
    <div class="projects" id="projects-container"></div>
  </section>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    particlesJS("particles-js", { particles: { number: { value: 80 }, color: { value: "#39ff14" }, shape: { type: "circle" }, opacity: { value: 0.5 }, size: { value: 3 }, line_linked: { enable: true, color: "#39ff14" }, move: { enable: true, speed: 2 } } });
    const projects = [
      { name: "SafetyShield AI", desc: "Quad-Shield AI framework for real-time safety.", tech: "Python, spaCy, Streamlit", url: "https://github.com/TanakaShumba/SafetyShield-AI" },
      { name: "Sub-Sniper", desc: "Offensive security subdomain scanner.", tech: "Python, AsyncIO", url: "https://github.com/TanakaShumba/SubSniper" },
      { name: "MediChat", desc: "Multilingual AI patient triage system.", tech: "Python, Flask", url: "https://github.com/TanakaShumba/MediChat" },
      { name: "CyberTrack", desc: "macOS security auditing tool.", tech: "Python, Socket", url: "https://github.com/TanakaShumba/CyberTrack" },
      { name: "python-network-scanner", desc: "Network scanning tool.", tech: "Python", url: "https://github.com/TanakaShumba/python-network-scanner" },
      { name: "automated-vulnerability-scanner", desc: "Nmap results to CVE mapping.", tech: "Python", url: "https://github.com/TanakaShumba/automated-vulnerability-scanner" }
    ];
    const container = document.getElementById("projects-container");
    projects.forEach(p => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<h3>${p.name}</h3><p>${p.desc}</p><div class="tech">Tech: ${p.tech}</div><a class="btn" href="${p.url}" target="_blank">View on GitHub</a>`;
      container.appendChild(card);
    });
  </script>
</body>
</html>
